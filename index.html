<script>
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr_CZ2DtWu-i-98WhSdODohQkmmFTmf2WAHb_R8W8mOxLLz-n_exBG_ew-vXHJhfRnk83JPBfhvrHO/pub';

const GIDS = {
  'PP': '660363670',
  '1': '1100475740',
  '2': '1314121724',
  '3': '2052746590',
  '4': '1062010731',
  '5': '1083301249',
  '6': '888320900'
};

function isDzongkha(str) {
  return /[\u0F00-\u0FFF]/.test(str);
}

function formatSkills(text) {
  if (!text) return '';
  const lines = text.split('\n').map(s => s.trim()).filter(s => s);
  const goals = [];
  let i = 0;
  while (i < lines.length) {
    if (isDzongkha(lines[i])) {
      const dzo = lines[i];
      const eng = (i + 1 < lines.length && !isDzongkha(lines[i+1])) ? lines[i+1] : null;
      goals.push('<div class="goal"><span class="bullet">&bull;</span><span class="goal-content"><span class="dzo-script">' + esc(dzo) + '</span>' + (eng ? '<span class="dzo-english">' + esc(eng) + '</span>' : '') + '</span></div>');
      i += eng ? 2 : 1;
    } else {
      goals.push('<div class="goal"><span class="bullet">&bull;</span><span class="goal-content plain-line">' + esc(lines[i]) + '</span></div>');
      i++;
    }
  }
  return goals.join('');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stripYear(label) {
  return label.replace(/,\s*\d{4}$/, '');
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      if (text[i] === '"') {
        // Quoted field — may contain commas and newlines
        i++;
        let field = '';
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { field += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { field += text[i++]; }
        }
        row.push(field);
        if (text[i] === ',') i++;
      } else {
        let field = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          field += text[i++];
        }
        row.push(field);
        if (text[i] === ',') i++;
      }
      if (i >= text.length || text[i] === '\n' || text[i] === '\r') break;
    }
    // Skip \r\n or \n
    if (text[i] === '\r') i++;
    if (text[i] === '\n') i++;
    if (row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

function buildClassHTML(classNum, rows) {
  const classLabel = classNum === 'PP' ? 'PP' : 'Class ' + classNum;
  const weeks = [];
  let currentWeek = null;

  for (const row of rows) {
    const col0 = (row[0] || '').trim();
    const col1 = (row[1] || '').trim();
    if (col0.startsWith('WEEK OF ')) {
      if (currentWeek) weeks.push(currentWeek);
      currentWeek = { label: col0.replace('WEEK OF ', ''), rows: [] };
    } else if (currentWeek && col0 && col0 !== 'Subject' && col0 !== '—') {
      currentWeek.rows.push({ subject: col0, skills: col1 });
    }
  }
  if (currentWeek) weeks.push(currentWeek);

  if (weeks.length === 0) {
    return '<div style="margin-bottom:12px;"><a onclick="showSelector(); return false;" href="#" style="font-family:Poppins,sans-serif; font-size:12px; font-weight:600; color:#5a4000; text-decoration:none; background:#F4D03F; padding:5px 14px; border-radius:20px;">← All classes</a></div><div class="class-title">' + classLabel + ' — Weekly Update</div><div class="class-sub">Updated every Saturday</div><div class="no-weeks">No updates posted yet. Check back after Saturday.</div>';
  }

  const current = weeks[0];
  const archive = weeks.slice(1);

  // Current week table
  const currentRows = current.rows.length > 0
    ? current.rows.map(r => '<tr><td class="subject-col">' + esc(r.subject) + '</td><td>' + formatSkills(r.skills) + '</td></tr>').join('')
    : '<tr><td colspan="2" style="padding:10px 18px;">No learning goals recorded this week.</td></tr>';

  let html = '<div style="margin-bottom:12px;"><a onclick="showSelector(); return false;" href="#" style="font-family:Poppins,sans-serif; font-size:12px; font-weight:600; color:#5a4000; text-decoration:none; background:#F4D03F; padding:5px 14px; border-radius:20px;">← All classes</a></div><div class="class-title">' + classLabel + ' — Weekly Update</div>';
  html += '<div class="class-sub">Updated every Saturday</div>';
  html += '<div class="week-header">' + esc(stripYear(current.label)) + '</div>';
  html += '<table class="week-table"><tr><th class="subject-col">Subject</th><th>Learning Goals This Week</th></tr>' + currentRows + '</table>';

  // Archive
  if (archive.length > 0) {
    const archiveBlocks = archive.map(w => {
      const rows = w.rows.map(r => '<tr><td class="subject-col">' + esc(r.subject) + '</td><td>' + formatSkills(r.skills) + '</td></tr>').join('');
      return '<div class="archive-week"><div class="archive-week-label">' + esc(w.label) + '</div><table class="archive-table"><tr><th class="subject-col">Subject</th><th>Learning Goals</th></tr>' + rows + '</table></div>';
    }).join('');

    html += '<div class="archive-toggle" onclick="toggleArchive()"><span><span id="archiveArrow">▸ Show</span> previous weeks</span><span style="font-size:11px;">' + archive.length + ' week' + (archive.length === 1 ? '' : 's') + ' archived</span></div>';
    html += '<div class="archive-section" id="archiveSection"><div style="height:0.75rem;"></div>' + archiveBlocks + '</div>';
  }

  return html;
}

function toggleArchive() {
  var s = document.getElementById('archiveSection');
  var a = document.getElementById('archiveArrow');
  if (s.style.display === 'block') { s.style.display = 'none'; a.textContent = '▸ Show'; }
  else { s.style.display = 'block'; a.textContent = '▾ Hide'; }
}

function showSelector() {
  document.getElementById('selectorPage').style.display = 'flex';
  document.getElementById('classPage').style.display = 'none';
  history.pushState({}, '', window.location.pathname);
}

function loadClass(classNum) {
  document.getElementById('selectorPage').style.display = 'none';
  document.getElementById('classPage').style.display = 'block';
  document.getElementById('classContent').innerHTML = '<div class="loading">Loading...</div>';
  history.pushState({ class: classNum }, '', '?class=' + classNum);

  const url = BASE_URL + '?gid=' + GIDS[classNum] + '&single=true&output=csv';
  fetch(url)
    .then(r => r.text())
    .then(text => {
      const rows = parseCSV(text);
      document.getElementById('classContent').innerHTML = buildClassHTML(classNum, rows);
    })
    .catch(() => {
      document.getElementById('classContent').innerHTML = '<div class="loading">Could not load data. Please try again.</div>';
    });
}

// Handle browser back button
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.class) { loadClass(e.state.class); }
  else { showSelector(); }
});

// Check URL on load for direct links (?class=2)
(function() {
  const params = new URLSearchParams(window.location.search);
  const cls = params.get('class');
  if (cls && GIDS[cls]) { loadClass(cls); }
})();
</script>
</body>
</html>
